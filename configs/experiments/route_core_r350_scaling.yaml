experiment_name: route_core_r350_scaling
description: BRIAN-R350 scaling package for the first route-core scale trend.
baseline_train_config: configs/train/stage0_r350_baseline.yaml
ablations:
  - id: B0
    name: r350_fixed_baseline
    train_config: configs/train/stage0_r350_baseline.yaml
    purpose: 350M fixed decoder-only baseline.
  - id: B1
    name: r350_routed_main
    train_config: configs/train/stage4_r350_output_action.yaml
    purpose: 350M routed main path with top-k routing, block-position state, and hard output action.
  - id: B2
    name: r350_no_position
    train_config: configs/train/ablation_b2_r350_no_position.yaml
    purpose: 350M route-core ablation without block-position state.
  - id: B3
    name: r350_no_output_action
    train_config: configs/train/ablation_b3_r350_no_output_action.yaml
    purpose: 350M routed ablation with scheduled routing but no hard terminal output action.
  - id: B4
    name: r350_difficulty_pattern_route
    train_config: configs/train/ablation_b4_r350_difficulty_route.yaml
    purpose: 350M mixed skip/recur pseudo-route curriculum using the current difficulty-pattern policy.

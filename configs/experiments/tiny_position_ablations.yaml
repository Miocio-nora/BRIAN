experiment_name: tiny_position_ablations
description: Fast Stage 3 block-position ablation smoke package.
baseline_train_config: configs/train/stage0_tiny_debug.yaml
ablations:
  - id: P0
    name: no_position_state
    train_config: configs/train/stage3_no_position_tiny_debug.yaml
    purpose: Verify zero-position Stage 3 smoke execution.
  - id: P1
    name: random_position_initialization
    train_config: configs/train/stage3_position_random_tiny_debug.yaml
    purpose: Verify random position initialization in smoke.
  - id: P2
    name: open_arc_position_initialization
    train_config: configs/train/stage3_tiny_debug.yaml
    purpose: Main tiny position path.
  - id: P3
    name: circular_position_initialization
    train_config: configs/train/stage3_position_circular_tiny_debug.yaml
    purpose: Compare circular position initialization in smoke.
  - id: P4
    name: position_only_to_router
    train_config: configs/train/stage3_position_router_only_tiny_debug.yaml
    purpose: Verify router-only position smoke execution.
  - id: P5
    name: position_to_router_and_blocks
    train_config: configs/train/stage3_tiny_debug.yaml
    purpose: Main tiny position path with router and block side-channel.
  - id: P6
    name: no_location_bias
    train_config: configs/train/stage3_position_no_location_bias_tiny_debug.yaml
    purpose: Tiny smoke ablation with geometric router location bias disabled.
  - id: P7
    name: no_location_loss
    train_config: configs/train/stage3_position_no_location_loss_tiny_debug.yaml
    purpose: Tiny smoke ablation with location regularization disabled.
  - id: P8
    name: direct_position_hidden_addition
    train_config: configs/train/stage3_position_direct_add_tiny_debug.yaml
    purpose: Tiny smoke ablation for direct position-hidden addition.
  - id: P9
    name: separate_position_state
    train_config: configs/train/stage3_position_separate_state_tiny_debug.yaml
    purpose: Tiny smoke path for the separate adapter position state.

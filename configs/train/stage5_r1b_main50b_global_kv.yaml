extends: stage5_r1b_global_kv_pilot.yaml
stage: stage5_global_kv
model_config: ../model/brian_r1b.yaml
data_config: ../data/r1b_main_50b.yaml
batch_size: 1
max_steps: 50000
eval_interval: 2000
save_interval: 5000
learning_rate: 0.00015
warmup_steps: 2000
activation_checkpointing: true
routing:
  mode: scheduled
  pseudo_policy: mixed_skip_recur
  hard_exit: true
  schedule:
    - max_step: 5000
      router_probability: 0.10
      lambda_route: 1.0
    - max_step: 15000
      router_probability: 0.30
      lambda_route: 0.5
    - max_step: 30000
      router_probability: 0.60
      lambda_route: 0.2
    - max_step: 40000
      router_probability: 0.80
      lambda_route: 0.05
    - max_step: 50000
      router_probability: 1.00
      lambda_route: 0.05
loss_weights:
  route: 0.05
  balance: 0.01
  cost: 0.01
  location: 0.02

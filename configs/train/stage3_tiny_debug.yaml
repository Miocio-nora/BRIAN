extends: stage3_scheduled_free_routing.yaml
model_config: ../model/brian_tiny.yaml
data_config: ../data/r125_tiny_debug.yaml
precision: fp32
batch_size: 2
max_steps: 3
eval_interval: 1
save_interval: 3
routing:
  mode: scheduled
  pseudo_policy: mixed_skip_recur
  schedule:
    - max_step: 1
      router_probability: 0.10
      lambda_route: 1.0
    - max_step: 2
      router_probability: 0.50
      lambda_route: 0.5
    - max_step: 3
      router_probability: 1.00
      lambda_route: 0.05

extends: stage4_r350_output_action.yaml
stage: stage4_output_action
model_config: ../model/brian_r350_top2.yaml
data_config: ../data/r350_main_30b.yaml
batch_size: 1
max_steps: 30000
eval_interval: 1000
save_interval: 3000
learning_rate: 0.0002
lr_schedule: linear_warmup_cosine_decay
warmup_steps: 1000
min_learning_rate: 0.00002
routing:
  mode: scheduled
  pseudo_policy: mixed_skip_recur
  hard_exit: true
  schedule:
    - max_step: 3000
      router_probability: 0.10
      lambda_route: 1.0
    - max_step: 9000
      router_probability: 0.30
      lambda_route: 0.5
    - max_step: 18000
      router_probability: 0.60
      lambda_route: 0.2
    - max_step: 24000
      router_probability: 0.80
      lambda_route: 0.05
    - max_step: 30000
      router_probability: 1.00
      lambda_route: 0.05
loss_weights:
  route: 0.05
  balance: 0.01
  cost: 0.01
  location: 0.02

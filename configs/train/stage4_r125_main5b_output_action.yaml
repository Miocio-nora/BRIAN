extends: stage4_output_action.yaml
stage: stage4_output_action
model_config: ../model/brian_r125_top2.yaml
data_config: ../data/r125_main_5b.yaml
batch_size: 4
max_steps: 25000
eval_interval: 1000
save_interval: 2500
learning_rate: 0.0003
lr_schedule: linear_warmup_cosine_decay
warmup_steps: 500
min_learning_rate: 0.00003
routing:
  mode: scheduled
  pseudo_policy: mixed_skip_recur
  hard_exit: true
  schedule:
    - max_step: 2500
      router_probability: 0.10
      lambda_route: 1.0
    - max_step: 7500
      router_probability: 0.30
      lambda_route: 0.5
    - max_step: 15000
      router_probability: 0.60
      lambda_route: 0.2
    - max_step: 20000
      router_probability: 0.80
      lambda_route: 0.05
    - max_step: 25000
      router_probability: 1.00
      lambda_route: 0.05
loss_weights:
  route: 0.05
  balance: 0.01
  cost: 0.01
  location: 0.02

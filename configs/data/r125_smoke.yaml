recipe_name: r125_smoke
target_tokens: 100000000
sequence_length: 2048
validation_tokens: 20000000
output_dir: data/tokenized/r125_smoke
manifest_path: data/manifests/r125_smoke.jsonl
tokenizer:
  name: mistralai/Mistral-7B-v0.1
  revision: main
  license: apache-2.0
  local_files_only: false
  fallback_to_byte: false
mixture:
  fineweb_edu:
    weight: 0.70
    source_dataset: HuggingFaceFW/fineweb-edu
    split: train
  tinystories:
    weight: 0.10
    source_dataset: roneneldan/TinyStories
    split: train
  synthetic_routing:
    weight: 0.10
    source_dataset: brian_synthetic_routing
    split: train
  math_symbolic_qa:
    weight: 0.05
    source_dataset: synthetic_math_symbolic
    split: train
  code_structured:
    weight: 0.05
    source_dataset: synthetic_code_structured
    split: train
synthetic_only:
  enabled: false
  sample_count: 1000
seed: 1
